services:
  # ─── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: br10_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-br10netmanager}
      POSTGRES_USER: ${DB_USER:-br10user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: America/Bahia
      PGTZ: America/Bahia
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-br10user} -d ${DB_NAME:-br10netmanager}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - br10_network

  # ─── Redis Cache ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: br10_redis
    restart: unless-stopped
    environment:
      TZ: America/Bahia
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret_password} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_secret_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - br10_network

  # ─── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: br10_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-br10user}:${DB_PASSWORD}@db:5432/${DB_NAME:-br10netmanager}
      - DATABASE_URL_SYNC=postgresql://${DB_USER:-br10user}:${DB_PASSWORD}@db:5432/${DB_NAME:-br10netmanager}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret_password}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://br10web.br10consultoria.com.br,http://br10web.br10consultoria.com.br,http://localhost,http://localhost:80,http://localhost:3000,http://localhost:5173}
      - BACKUP_DIR=/app/backups
      - UPLOAD_DIR=/app/uploads
      - ENVIRONMENT=production
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=America/Bahia
      # OpenVAS: aponta para o host local onde o Greenbone Community Edition roda separado
      # Após instalar o OpenVAS com o script scripts/install-openvas.sh, configure:
      # OPENVAS_HOST=172.20.0.1  (ou o IP do host na rede br10_network)
      - OPENVAS_HOST=${OPENVAS_HOST:-localhost}
      - OPENVAS_PORT=${OPENVAS_PORT:-9390}
      - OPENVAS_USER=${OPENVAS_USER:-admin}
      - OPENVAS_PASSWORD=${OPENVAS_PASSWORD:-admin123}
    volumes:
      - ./backend/app:/app/app  # Hot-reload: git pull + restart atualiza o código sem rebuild
      - backend_backups:/app/backups
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    # Capacidades necessárias para criar conexões VPN L2TP
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/ppp:/dev/ppp
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - br10_network

  # ─── Frontend (Nginx serving static files) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: br10_frontend
    restart: unless-stopped
    environment:
      TZ: America/Bahia
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - br10_network

  # ─── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: br10_nginx
    restart: unless-stopped
    environment:
      TZ: America/Bahia
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/certbot:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - br10_network

  # ─── Backup Scheduler ──────────────────────────────────────────────────────
  backup-scheduler:
    image: alpine:3.19
    container_name: br10_backup_scheduler
    restart: unless-stopped
    environment:
      - BACKUP_API_URL=http://backend:8000/api/v1/backup/create
      - BACKUP_API_KEY=${BACKUP_API_KEY:-}
      - TZ=America/Bahia
    volumes:
      - backend_backups:/backups
    command: >
      sh -c "apk add --no-cache curl tzdata &&
             cp /usr/share/zoneinfo/America/Bahia /etc/localtime &&
             echo 'America/Bahia' > /etc/timezone &&
             echo '0 2 * * * curl -s -X POST http://backend:8000/api/v1/backup/create -H \"X-API-Key: ${BACKUP_API_KEY}\" >> /var/log/backup.log 2>&1' | crontab - &&
             crond -f -l 2"
    depends_on:
      - backend
    networks:
      - br10_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_backups:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local
  nginx_logs:
    driver: local

networks:
  br10_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
